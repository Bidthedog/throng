name: CI

# Quality gates for throng (see the constitution, "Static analysis & linting"
# and Principle V). Lint + type-check + the vitest layers + the Playwright-Electron
# E2E suite all run on every push to master and every pull request.
#
# Everything runs on Windows: throng is a Windows-first app whose terminal stack is
# ConPTY / node-pty and whose de-elevation path shells out to Windows tools, so the
# suite cannot run on a Linux runner. The Windows runner has a virtual desktop, which
# the E2E layer requires (the app has no headless mode — inline xterm.js terminals
# only paint in a visible window; see docs/testing.md).
#
# Runner is pinned to `windows-2022` (not `windows-latest`): `windows-latest` now maps
# to Windows Server 2025 shipping Visual Studio 2026, which the node-gyp bundled with
# Node 20's npm does not recognise ("unknown version ... at ...\Visual Studio\18") — so
# the better-sqlite3 / node-pty native builds fail at `npm ci`. windows-2022 ships
# VS 2022, which node-gyp detects. Revisit when node-gyp/npm gain VS 2026 support.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR cancels an in-flight run to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # node-gyp builds (better-sqlite3, node-pty) are noisy; keep logs terse.
  npm_config_loglevel: error

jobs:
  lint:
    name: Lint & type-check
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript type-check
        run: npm run typecheck

  test:
    name: Unit / integration / contract
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Point TEMP/TMP at an alias-free path. The default %TEMP%
      # (C:\Users\RUNNER~1\...) carries an 8.3 short-name because the runner username
      # forces one. Some file specs realpath a target (expanding RUNNER~1 to its long
      # form) then compare it against the raw short-name root, breaking in-tree /
      # watcher-path matching — only where 8.3 names appear. RUNNER_TEMP (D:\a\_temp)
      # has no aliased components. (runner.temp isn't usable in a job-level `env`.)
      - name: Use an alias-free temp dir
        shell: pwsh
        run: |
          "TEMP=$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TMP=$env:RUNNER_TEMP"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install dependencies
        run: npm ci
      # Unit tests run against TypeScript source (aliased in vitest.config.ts) and need
      # no build. Integration & contract, however, spawn the REAL daemon
      # (`node packages/daemon/dist/main.js`) and read its `dist/BUILD_ID`, so the daemon
      # must be built first — on a clean checkout there is no `dist/`. `npm run build`
      # produces the daemon dist and stamps BUILD_ID (same build the E2E job runs).
      - name: Build (daemon dist + BUILD_ID for the daemon-spawning layers)
        run: npm run build
      # Integration & contract spawn real OS processes and are single-file-serial by
      # design (see docs/testing.md) — run each layer as its own step so a failure names it.
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Contract tests
        run: npm run test:contract

  e2e:
    name: E2E (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: windows-2022
    # Per shard: one build + ~1/3 of the suite at single worker. 30 min is generous headroom
    # over the ~4-5 min a shard actually takes (the old single-job budget was 45 for the whole).
    timeout-minutes: 30
    strategy:
      # Do NOT cancel sibling shards when one fails: we want the full red/green picture, and the
      # merged report needs every shard's blob present. Each shard is its own required check.
      fail-fast: false
      matrix:
        # Three parallel single-worker shards, each on its own fresh 4-vCPU runner. This is the
        # SAFE speed lever (issue #75, part 2): scale OUT across machines, never UP in
        # workers-per-runner. Raising THRONG_E2E_WORKERS reintroduces the exact CPU contention
        # (RPC-budget timeouts, launch-SLA misses, EPERM teardown races) that `failOnFlakyTests`
        # now turns into red runs. ~12 min single-job -> ~4-5 min wall-time, at 3x runner-minutes.
        shard: [1, 2, 3]
    env:
      # SINGLE WORKER PER SHARD — the invariant the whole approach rests on (see the matrix note).
      # Each worker is a full Electron app + detached daemon + real shells; per docs/testing.md
      # failures RISE with worker count on this constrained runner.
      THRONG_E2E_WORKERS: 1
      # Retries kept for DIAGNOSTIC value only — they capture the first failure's assertion and
      # trace. They no longer absorb anything: `failOnFlakyTests` (playwright.config.ts) fails a
      # test that only passes on retry (017, FR-014). Green means every test passed FIRST attempt.
      THRONG_E2E_RETRIES: 3
      # Non-empty => playwright.config.ts switches this shard's reporter to the mergeable `blob`
      # format (the shard total, supplied so the config can log it). `merge-e2e` stitches them back.
      THRONG_E2E_SHARDS: ${{ strategy.job-total }}
      # Where the per-shard JSON report lands. ci-e2e-shard.ps1 reads its `stats` to tell a genuine
      # test flake/failure (stays red) apart from a pure infra fault (retried once) — issue #75.
      THRONG_E2E_JSON_OUT: shard-report.json
      # Lets the retry step comment on the tracking issue when an infra fault is auto-retried.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Alias-free temp dir — see the note on the `test` job (avoids 8.3 short-name
      # path mismatches from the C:\Users\RUNNER~1\... default %TEMP%).
      - name: Use an alias-free temp dir
        shell: pwsh
        run: |
          "TEMP=$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TMP=$env:RUNNER_TEMP"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install dependencies
        run: npm ci
      # The runner's virtual desktop defaults to 1024x768 — too small for the window
      # geometry some specs assert (e.g. restoring a 1100px-wide window clamps to 1024)
      # and cramped for drag-and-drop. Bump it before the app opens real windows.
      - name: Set screen resolution to 1920x1080
        shell: pwsh
        run: |
          Add-Type @'
          using System;
          using System.Runtime.InteropServices;
          public class Disp {
            [StructLayout(LayoutKind.Sequential, CharSet=CharSet.Ansi)]
            public struct DEVMODE {
              [MarshalAs(UnmanagedType.ByValTStr, SizeConst=32)] public string dmDeviceName;
              public short dmSpecVersion, dmDriverVersion, dmSize, dmDriverExtra;
              public int dmFields, dmPositionX, dmPositionY, dmDisplayOrientation, dmDisplayFixedOutput;
              public short dmColor, dmDuplex, dmYResolution, dmTTOption, dmCollate;
              [MarshalAs(UnmanagedType.ByValTStr, SizeConst=32)] public string dmFormName;
              public short dmLogPixels; public int dmBitsPerPel, dmPelsWidth, dmPelsHeight;
              public int dmDisplayFlags, dmDisplayFrequency, dmICMMethod, dmICMIntent, dmMediaType, dmDitherType;
              public int dmReserved1, dmReserved2, dmPanningWidth, dmPanningHeight;
            }
            [DllImport("user32.dll")] public static extern int EnumDisplaySettings(string d, int n, ref DEVMODE dm);
            [DllImport("user32.dll")] public static extern int ChangeDisplaySettings(ref DEVMODE dm, int f);
            public static int Set(int w, int h) {
              DEVMODE dm = new DEVMODE();
              dm.dmSize = (short)Marshal.SizeOf(typeof(DEVMODE));
              if (EnumDisplaySettings(null, -1, ref dm) == 0) return -1;
              dm.dmPelsWidth = w; dm.dmPelsHeight = h;
              dm.dmFields = 0x80000 | 0x100000; // DM_PELSWIDTH | DM_PELSHEIGHT
              return ChangeDisplaySettings(ref dm, 0);
            }
          }
          '@
          $rc = [Disp]::Set(1920, 1080)
          Write-Host "ChangeDisplaySettings -> $rc (0 = success)"
      # `pretest:e2e` builds the app first. The runner is elevated (GitHub Windows
      # runners run as administrator), so: @admin specs remain excluded by default
      # (playwright.config.ts grepInvert), and non-elevated-baseline specs self-skip via
      # skipIfElevated().
      #
      # `--shard=i/N` runs this shard's slice only; Playwright splits by FILE (fullyParallel is
      # false), so a describe.serial file stays whole on one shard. The blob reporter writes
      # blob-report/report-<shard>.zip, uploaded below for `merge-e2e` to stitch together.
      # Run this shard under the issue-#75 flake policy: a genuine test flake/failure (report shows
      # flaky>0 or unexpected>0) stays RED — the strict gate (failOnFlakyTests, Principle V) is
      # untouched. Only a PURE INFRA fault (non-zero exit with 0 flaky AND 0 unexpected — a worker/
      # global-teardown crash no test owns, which no retry absorbs) is retried once. The classifier
      # cannot turn a real test flake green; see scripts/ci-e2e-shard.ps1 and the constitution.
      - name: Run E2E shard (flake-policy aware)
        shell: pwsh
        run: ./scripts/ci-e2e-shard.ps1 -Shard "${{ matrix.shard }}/${{ strategy.job-total }}"
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload traces for this shard
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Stitch the shards back into ONE HTML report. This job is a REPORTER, not a gate — it never
  # fails on a red shard, and it must NOT be a required status check.
  #
  # The required checks are the three `E2E (shard i/3)` jobs themselves. Gating on a downstream
  # merge job instead put its `npm ci` (~2m) on the critical path for no signal the shards don't
  # already carry: the shards go red on their own, and waiting for a report to tell us so cost
  # more wall-time than the sharding saved (~11m to green vs ~12m unsharded — issue #75, part 2).
  # With this job off the path, green arrives with the slowest shard, ~9m.
  merge-e2e:
    name: E2E report (merged)
    # Run even when a shard failed (so the report is always produced), but not when cancelled.
    if: ${{ !cancelled() }}
    needs: e2e
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # merge-reports needs @playwright/test present; npm ci is the simplest reliable way to get it.
      - name: Install dependencies
        run: npm ci
      - name: Download shard blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true
      - name: Merge blobs into one HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload merged Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      # Say which shards failed, for whoever opens the report — but do NOT fail on it. The shard
      # jobs are the gate; re-reddening here would only add a second, later copy of a signal
      # branch protection already has, and would drag this job's cost onto the critical path.
      - name: Note shard outcome
        if: ${{ always() }}
        shell: pwsh
        run: |
          $r = '${{ needs.e2e.result }}'
          if ($r -ne 'success') {
            Write-Host "::warning::One or more E2E shards did not pass (needs.e2e.result = $r) — see the shard checks."
          } else {
            Write-Host "All E2E shards passed."
          }

  # 019 (FR-013a / SC-008) — RUN THE @admin SUBSET, on the runner that can actually run it.
  #
  # Until this job existed, @admin specs were excluded from the ONLY runner capable of executing
  # them. GitHub's windows-2022 runners are ELEVATED, which is the precondition #94 needs — and
  # playwright.config.ts grepInverts @admin unless THRONG_E2E_INCLUDE_ADMIN is set, which nothing
  # here set. Meanwhile skipIfElevated() specs self-skip here. So the elevated path had ZERO
  # coverage while docs/testing.md claimed CI ran non-elevated. That is how the hole read as
  # covered.
  #
  # This is its OWN job rather than a step inside `e2e`: the shards split the suite by file, so an
  # @admin step there would run three times or — if no @admin file landed on that shard — not at
  # all. One job, one run, one signal.
  e2e-admin:
    name: E2E (@admin, elevated)
    runs-on: windows-2022
    timeout-minutes: 20
    env:
      THRONG_E2E_WORKERS: 1
      # Clears playwright.config.ts's grepInvert so @admin is SELECTED rather than excluded.
      THRONG_E2E_INCLUDE_ADMIN: '1'
      PLAYWRIGHT_JSON_OUTPUT_NAME: admin-report.json
      # The de-elevation spec's own LAUNCH_BUDGET_MS is 25s, SHORTER than the production worst
      # case of connect 15s + readiness 15s (019 C7) — a connect at ~14s followed by no ack would
      # surface at ~29s and be reported as "it hung (#94)", the very failure the spec exists to
      # detect. 8000/8000 makes the worst case 16s. Production defaults (15000/15000) are
      # untouched; these are injected settings, not code (Principle X).
      THRONG_AGENT_CONNECT_TIMEOUT_MS: '8000'
      THRONG_AGENT_READY_TIMEOUT_MS: '8000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      # `npx playwright test` DIRECTLY, never `npm run test:e2e:admin`: that script exists to hop
      # UAC from a non-elevated shell (Start-Process -Verb RunAs) and is pointless — and
      # interactive (-NoExit) — where the process is already elevated.
      - name: Run @admin E2E suite (this runner is elevated)
        shell: pwsh
        run: |
          # Quote '@admin': in PowerShell a bare @admin is the splatting operator on an (undefined)
          # variable $admin, so the tag expands to nothing and Playwright selects zero tests —
          # which this step's own fail-on-zero guard then reports as an uncovered de-elevation path.
          npx playwright test --grep '@admin' --workers=1 --reporter=list,json
          $testsFailed = $LASTEXITCODE -ne 0
          # A run that selected NOTHING must fail. Playwright exits 0 on an empty selection, so
          # exit code alone cannot tell "all @admin specs passed" from "no @admin spec ran" — and
          # SC-008 measures EXECUTED > 0, not exit 0. A green bar bought by an empty selection is
          # precisely the proof-that-cannot-fail this feature abolishes.
          if (-not (Test-Path admin-report.json)) { throw 'No @admin JSON report was produced.' }
          $stats = (Get-Content admin-report.json -Raw | ConvertFrom-Json).stats
          $executed = $stats.expected + $stats.unexpected + $stats.flaky
          Write-Host "@admin executed=$executed (expected=$($stats.expected) unexpected=$($stats.unexpected) flaky=$($stats.flaky) skipped=$($stats.skipped))"
          if ($executed -lt 1) {
            throw "No @admin test EXECUTED ($($stats.skipped) skipped). This runner is elevated, so an @admin spec that skips or is grep-excluded means the de-elevation path is unverified — the hole 019 FR-013a closes."
          }
          if ($testsFailed) { throw 'The @admin E2E suite failed.' }
      - name: Upload @admin traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-admin
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
